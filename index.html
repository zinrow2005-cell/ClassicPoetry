<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>道法自然書法系統｜選擇介面</title><style>:root{font-family:"DFKai-SB","BiauKai","KaiTi",serif;color:#2c1a10;background:#efe2cb}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at 20% 10%,#fff9ec 0,#efe2cb 42%,#d8bd95 100%);box-sizing:border-box}.card{width:min(720px,96vw);background:rgba(255,250,239,.96);border:1px solid #e3c69b;border-radius:32px;box-shadow:0 28px 90px rgba(67,40,18,.24);padding:30px;box-sizing:border-box}.brand{display:flex;gap:16px;align-items:center;border-bottom:1px solid #ead8bb;padding-bottom:18px;margin-bottom:20px}.seal{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,#bd6a18,#883a0c);color:#fff;display:grid;place-items:center;font-size:30px;font-weight:900;box-shadow:inset 0 0 0 3px rgba(255,255,255,.18)}h1{margin:0;font-size:34px;letter-spacing:.06em}.sub{margin-top:6px;color:#7c6654;font-size:16px;line-height:1.6}.hint{color:#6f5a48;line-height:1.8;margin:0 0 18px;font-size:16px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:16px}.actions button{border:1px solid #dfc49d;border-radius:24px;padding:20px 18px;text-align:left;font-family:inherit;font-weight:900;font-size:22px;background:#fffaf1;color:#3d2414;box-shadow:0 12px 32px rgba(83,48,18,.10);cursor:pointer}.actions button.primary{background:linear-gradient(135deg,#bd711e,#8f4710);color:white;border-color:#9f5615}.actions small{display:block;margin-top:9px;font-size:14px;line-height:1.55;font-weight:700;color:#846d59}.actions .primary small{color:#fff2dd}.wide{grid-column:1/-1}.foot{margin-top:18px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;color:#7d6652;font-size:14px}.foot button{border:1px solid #dfc49d;background:#fffaf1;color:#70451f;border-radius:999px;padding:9px 14px;font-weight:800;font-family:inherit;cursor:pointer}.warn{margin-top:14px;padding:12px 14px;border-radius:18px;background:#fff3df;border:1px dashed #d6ab73;color:#755337;font-size:14px;line-height:1.7}@media(max-width:640px){body{align-items:stretch;padding:14px}.card{border-radius:26px;padding:20px}.brand{align-items:flex-start}.seal{width:48px;height:48px;font-size:25px;border-radius:15px}h1{font-size:28px}.actions{grid-template-columns:1fr}.wide{grid-column:auto}.actions button{font-size:20px;padding:17px 16px}}</style></head><body><main class="card"><div class="brand"><div class="seal">道</div><div><h1>道法自然書法系統</h1><div class="sub">製作人 Diva Wang｜請選擇操作介面</div></div></div><p class="hint">這一版將電腦版獨立成 <b>desktop.html</b>、手機版獨立成 <b>mobile.html</b>，避免 GitHub 舊的 index.html 快取或舊檔造成跳回舊介面。</p><div class="actions"><button class="primary" data-mode="desktop">電腦版介面<small>適合電腦、iPad 橫向、大螢幕。進入新版桌機閱讀與學習系統。</small></button><button data-mode="mobile">手機版介面<small>適合手機直式。使用底部功能列切換閱讀、篩選、作品集、收藏、學習、書寫。</small></button><button class="wide" data-mode="auto">自動判斷介面<small>依照裝置與螢幕大小自動進入電腦版或手機版。</small></button></div><div class="warn">上傳 GitHub 時請解壓縮後整包上傳：index.html、desktop.html、mobile.html、writing.html、start_here.html。舊版檔案可刪除，避免混用。</div><div class="foot"><span id="savedModeText">目前尚未選擇</span><button id="clearModeBtn" type="button">清除記憶</button></div></main><script>(function(){const VER='326';const KEY='daofaInterfaceMode';function target(mode){if(mode==='desktop')return './desktop.html';if(mode==='mobile')return './mobile.html';const auto=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||Math.min(screen.width,screen.height)<760;return auto?'./mobile.html':'./desktop.html'}function name(mode){return mode==='desktop'?'電腦版介面':mode==='mobile'?'手機版介面':mode==='auto'?'自動判斷':'尚未選擇'}function refresh(){let m='';try{m=localStorage.getItem(KEY)||''}catch(e){}document.getElementById('savedModeText').textContent='目前記憶：'+name(m)}document.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{const mode=btn.dataset.mode;try{localStorage.setItem(KEY,mode)}catch(e){}location.href=target(mode)+'?v='+VER+'&t='+Date.now()}));document.getElementById('clearModeBtn').addEventListener('click',()=>{try{localStorage.removeItem(KEY)}catch(e){}refresh()});refresh()})();</script></body></html>
